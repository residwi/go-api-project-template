name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"  # every Monday at 09:00 UTC

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
